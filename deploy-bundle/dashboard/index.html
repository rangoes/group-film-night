    function sessionSectionHtml(state) {
      const session = state.currentSession;
      if (!session) {
        const canCreate = isViewerHost() && stateStore.attendeeIds.length > 0 && state.participants.length > 0;
        const attendeeCount = stateStore.attendeeIds.length;
        const attendeeNames = (state.participants || [])
          .filter((participant) => stateStore.attendeeIds.includes(participant.id))
          .map((participant) => participant.name);
        return `
          <section class="card">
            <div class="card-inner">
              <div class="session-hero">
                <div class="session-primary">
                  <div class="session-kicker">Filmabend anlegen</div>
                  <strong>${escapeHtml(formatSessionDate(stateStore.sessionPlannedFor))} als Sneak Night planen</strong>
                  <p>${!identitySelected() ? "Wähle zuerst oben deinen Namen." : !isViewerHost() ? "Hosts starten den Abend. Danach wartet nur noch der Reveal." : "Datum setzen, Crew festlegen, Auto-Pick starten."}</p>
                  <div class="session-quick-facts">
                    <span class="chip good">${attendeeCount} Teilnehmer ausgewählt</span>
                    <span class="chip">${canCreate ? "bereit für den Auto-Pick" : !identitySelected() ? "warte auf Namenswahl" : !isViewerHost() ? "wartet auf Host-Start" : "noch nicht startklar"}</span>
                  </div>
                  <div class="session-stage">
                    <article class="session-step active">
                      <span>01</span>
                      <strong>Runde festlegen</strong>
                      <p>Wer ist heute wirklich dabei?</p>
                    </article>
                    <article class="session-step">
                      <span>02</span>
                      <strong>Auto-Pick</strong>
                      <p>Das System trifft die Auswahl.</p>
                    </article>
                    <article class="session-step">
                      <span>03</span>
                      <strong>Reveal</strong>
                      <p>Erst vor Ort wird der Titel sichtbar.</p>
                    </article>
                  </div>
                  ${attendeeNames.length ? `
                    <p class="session-plan-note">Aktuell im Abend-Setup: ${escapeHtml(attendeeNames.join(", "))}</p>
                  ` : ""}
                  ${isViewerHost() ? `
                  <form class="session-plan-form" data-form="create-session">
                    <div class="session-plan-grid">
                      <input class="field" type="date" name="scheduledFor" value="${escapeHtml(stateStore.sessionPlannedFor || defaultSessionDate())}" />
                      <button class="btn btn-primary" type="submit" ${!canCreate || isBusy("session-create") ? "disabled" : ""}>
                        ${isBusy("session-create") ? "Berechne Pick..." : "Filmabend anlegen"}
                      </button>
                    </div>
                    <div class="session-plan-note">Das System nutzt Likes, Neutrals, Dislikes und den Gesehen-Status der heutigen Runde.</div>
                  </form>
                  ` : `<div class="empty" style="margin-top: 16px;">${escapeHtml(interactionHint(state) || "Ein Host startet den Filmabend. Danach wartet der fertige Pick nur noch auf den Reveal.")}</div>`}
                </div>
                <div class="session-sidekick">
                  <div class="session-kicker">Der Ablauf</div>
                  <strong>Heute im Cast</strong>
                  <p>Die Hosts wählen nur die Runde aus. Alles Weitere passiert automatisch im Hintergrund.</p>
                  <div class="cast-pill-row">
                    ${attendeeNames.length ? attendeeNames.map((name) => `<span class="chip">${escapeHtml(name)}</span>`).join("") : `<span class="chip">Noch niemand gesetzt</span>`}
                  </div>
                </div>
              </div>
              <div class="candidate-grid" style="margin-top: 18px;">
                ${previewSessionCandidates.slice(0, 3).map((film, index) => `
                  <article class="candidate-card">
                    <div class="candidate-card-content">
                      <div class="kicker">${index === 0 ? "Typischer Auto-Pick" : "Weiterer guter Match"}</div>
                      <strong>${escapeHtml(film.title)}</strong>
                      <p>${escapeHtml(film.reason)}</p>
                    <div class="meta">
                      <span class="chip">${escapeHtml(film.serviceLabel)}</span>
                    </div>
                  </div>
                </article>
                `).join("")}
              </div>
              <div class="empty" style="margin-top: 18px;">
                Noch keine aktive Session. Die Karten oben zeigen nur, wie das System passende Titel für die heutige Runde priorisieren würde.
              </div>
            </div>
          </section>
        `;
      }

      const selection = session.selection;
      const canReveal = session.hasMoreReveals;
      const currentReveal = session.revealed && session.revealed.length
        ? session.revealed[session.revealed.length - 1]
        : null;
      const screenTitle = currentReveal ? currentReveal.film.title : "Heute wartet ein geheimer Pick";
      const screenKicker = currentReveal
        ? (currentReveal.position === 1 ? "Tonight's Feature" : `Backup Pick ${currentReveal.position}`)
        : "Vorhang noch geschlossen";
      const screenSub = currentReveal
        ? (currentReveal.position === 1
            ? "Die Leinwand ist an. Das ist der offizielle Film für heute Abend."
            : "Der naechste Backup-Pick ist jetzt auf der Leinwand.")
        : "Die Runde steht. Ein Klick auf Reveal startet den eigentlichen Kinomoment.";
      const screenCaptionTitle = currentReveal
        ? (currentReveal.position === 1 ? "Reveal erfolgreich" : "Backup aktiv")
        : "Leinwand bereit";
      const screenCaptionCopy = currentReveal
        ? (currentReveal.film.reason || "Vom System für diese Runde als starker Match priorisiert.")
        : "Der Film ist intern schon fixiert und wird erst beim Reveal auf der Leinwand sichtbar.";

      return `
        <section class="card">
          <div class="card-inner">
            <div class="session-hero">
              <div class="session-primary">
                <div class="session-kicker">Heutige Sneak-Session</div>
                <strong>${session.revealedCount ? "Der heutige Film ist da" : "Der heutige Film ist intern fixiert"}${session.scheduledFor ? ` · ${escapeHtml(formatSessionDate(session.scheduledFor))}` : ""}</strong>
                <p>${session.revealedCount ? "Wenn der erste Film spontan doch nicht passt, kannst du direkt den nächsten Backup-Pick aufdecken." : "Die Runde für heute steht. Der Film ist fixiert und wartet nur noch auf den Reveal."}</p>
                <div class="pills">
                  <span class="chip good">${(session.attendees || []).length} Personen heute dabei</span>
                  <span class="chip live">${session.revealedCount} Reveal${session.revealedCount === 1 ? "" : "s"}</span>
                  <span class="chip ${selection && selection.consensusPick ? "good" : ""}">${selection && selection.consensusPick ? "Konsens-Pick gefunden" : "Bester Match fixiert"}</span>
                </div>
                <div class="session-stage">
                  <article class="session-step done">
                    <span>01</span>
                    <strong>Runde steht</strong>
                    <p>Die Crew für heute ist festgelegt.</p>
                  </article>
                  <article class="session-step done">
                    <span>02</span>
                    <strong>Pick fixiert</strong>
                    <p>${selection && selection.consensusPick ? "Ein klarer Konsensfilm wurde gefunden." : "Das System hat den besten Match gewählt."}</p>
                  </article>
                  <article class="session-step ${session.revealedCount ? "active" : ""}">
                    <span>03</span>
                    <strong>Reveal-Moment</strong>
                    <p>${session.revealedCount ? "Falls nötig, wartet noch ein Backup." : "Ein Klick bringt den Film auf die Leinwand."}</p>
                  </article>
                </div>
              </div>
              <div class="session-sidekick">
                <div class="session-kicker">Heute im Cast</div>
                <strong>${(session.attendees || []).length} Personen für heute gesetzt</strong>
                <p>${selection ? `System-Fokus: ${escapeHtml(selection.reason || "Bester gemeinsamer Match für heute.")}` : "Die Runde ist gesetzt und wartet auf den Reveal."}</p>
                <div class="cast-pill-row">
                  ${(session.attendees || []).map((attendee) => `<span class="chip">${escapeHtml(attendee.name)}</span>`).join("")}
                </div>
              </div>
            </div>

            <div class="candidate-grid" style="margin-top: 18px;">
              ${[(currentReveal ? currentReveal.film : selection)].filter(Boolean).map((film, index) => `
                <article class="candidate-card" style="${film.image ? `background-image: url('${escapeHtml(film.image)}');` : ""}">
                  <div class="candidate-card-content">
                    <div class="kicker">${session.revealedCount ? `Aktueller Pick` : "Geheimer Pick"}</div>
                    <strong>${escapeHtml(session.revealedCount ? film.title : "Titel bleibt bis zum Reveal verborgen")}</strong>
                    <p>${escapeHtml(session.revealedCount ? film.reason : "Das System hat bereits den besten Match für diese Runde fixiert. Sichtbar wird er erst auf der Leinwand.")}</p>
                    <div class="meta">
                      ${session.revealedCount ? `
                        <span class="chip">${escapeHtml(film.serviceLabel)}</span>
                        ${rtBadge(film)}
                      ` : `
                        <span class="chip">${(session.attendees || []).length} Personen heute dabei</span>
                        <span class="chip ${selection && selection.consensusPick ? "good" : ""}">${selection && selection.consensusPick ? "Konsensfilm gefunden" : "Bester Match fixiert"}</span>
                      `}
                    </div>
                  </div>
                </article>
              `).join("")}
            </div>

            ${isViewerHost() ? `
              <div class="ballot-sheet">
                <strong>${session.revealedCount ? "Optionaler Backup-Reveal" : "Alles ist bereit für den Reveal"}</strong>
                <p class="section-copy" style="margin-top: 8px;">
                  ${session.revealedCount ? "Wenn die Gruppe den ersten Film doch skippt, kannst du direkt den nächsten passenden Backup-Pick aufdecken." : "Der Film ist schon intern ausgewählt. Erst jetzt bekommt die Runde ihn wirklich zu sehen."}
                </p>
                <div class="toolbar">
                  <button class="btn btn-primary" data-action="reveal-next" ${!canReveal || isBusy("reveal") ? "disabled" : ""}>
                    ${isBusy("reveal") ? "Reveal läuft..." : session.revealedCount ? "Nächsten Pick revealen" : "Film revealen"}
                  </button>
                  ${session.revealedCount ? `
                    <button class="btn btn-ghost" data-action="reset-reveal" ${isBusy("reveal-reset") ? "disabled" : ""}>
                      ${isBusy("reveal-reset") ? "Setze Reveal zurück..." : "Reveal zurücksetzen"}
                    </button>
                  ` : ""}
                </div>
              </div>
            ` : ""}

            <div class="cinema-reveal">
              <div class="cinema-proscenium"></div>
              <div class="cinema-screen ${currentReveal ? "" : "closed"}">
                <div class="cinema-screen-content">
                  <div class="cinema-screen-kicker">${escapeHtml(screenKicker)}</div>
                  <div class="cinema-screen-title">${escapeHtml(screenTitle)}</div>
                  <div class="cinema-screen-sub">${escapeHtml(screenSub)}</div>
                  <div class="cinema-screen-meta">
                    ${currentReveal ? `
                      <span class="chip">${escapeHtml(currentReveal.film.serviceLabel)}</span>
                      ${currentReveal.film.rt && currentReveal.film.rt.percent ? `<span class="chip">${escapeHtml(currentReveal.film.rt.percent)}% RT</span>` : ""}
                    ` : `
                      <span class="chip">${(session.attendees || []).length} Personen heute dabei</span>
                      <span class="chip ${selection && selection.consensusPick ? "good" : ""}">${selection && selection.consensusPick ? "Konsensfilm fixiert" : "Bester Match fixiert"}</span>
                    `}
                  </div>
                </div>
              </div>
              <div class="cinema-caption">
                <strong>${escapeHtml(screenCaptionTitle)}</strong>
                <span>${escapeHtml(screenCaptionCopy)}</span>
              </div>
              <div class="cinema-audience"></div>
              <div class="cinema-stage-floor"></div>
            </div>
            ${currentReveal && session.revealed.length > 1 ? `
                <div class="reveal-list">
                  ${session.revealed.filter((entry) => entry.position !== currentReveal.position).map((entry) => `
                    <article class="reveal-card">
                      <div class="place">Platz ${entry.position}</div>
                      <h3>${escapeHtml(entry.film.title)}</h3>
                      <div class="pills">
                        <span class="chip good">${escapeHtml(entry.film.serviceLabel)}</span>
                        ${entry.film.rt && entry.film.rt.percent ? `<span class="chip warn">${escapeHtml(entry.film.rt.percent)}% RT</span>` : ""}
                      </div>
                      <p class="section-copy" style="margin-top: 10px;">
                        Backup-Pick, falls die Runde weiterspringt.
                      </p>
                      ${entry.film.url ? `<p style="margin-top: 10px;"><a class="inline-link" href="${escapeHtml(entry.film.url)}" target="_blank" rel="noreferrer">Titel öffnen</a></p>` : ""}
                    </article>
                  `).join("")}
                </div>
              ` : ""}
          </div>
        </section>
      `;
    }

    function snackSectionHtml(state) {
      const session = state.currentSession;
      const viewerMode = hasViewerLink();
      const usePreview = !(state.participants || []).length;
      if (!session) {
        const previewRows = [
          { label: "Nachos", names: usePreview ? previewSnackAssignments.nachos : [] },
          { label: "Chips", names: usePreview ? previewSnackAssignments.chips : [] },
          { label: "Schokolade", names: usePreview ? previewSnackAssignments.schokolade : [] },
          { label: "Eis", names: usePreview ? previewSnackAssignments.eis : [] },
          { label: "Bier", names: usePreview ? previewSnackAssignments.bier : [] },
          { label: "Sonstiges", names: usePreview ? previewSnackAssignments.sonstiges : [] },
        ];
        return `
          <section class="card">
            <div class="card-inner">
              <h2 class="section-title">Snack Board</h2>
              <p class="section-copy">Nachos, Chips, Schokolade, Eis, Bier oder Sonstiges. Sobald eine Session läuft, klickt jeder einfach an, was er mitbringt.</p>
              <div class="snack-grid">
                ${previewRows.map((item) => `
                  <article class="snack-card ${item.names.length ? "claimed" : ""}">
                    <strong>${escapeHtml(`${snackIcon(item.label)} ${item.label}`)}</strong>
                    <p>${item.names.length ? `${escapeHtml(item.names.join(", "))} bringt es mit.` : usePreview ? "Noch offen." : "Wird aktiv, sobald ein Filmabend läuft."}</p>
                  </article>
                `).join("")}
              </div>
            </div>
          </section>
        `;
      }

      const activeParticipant = (session.attendees || []).find((item) => item.id === stateStore.activeSnackParticipantId)
        || session.attendees[0];
      const assignments = new Map((session.snackAssignments || []).map((entry) => [entry.snackId, entry]));
      const lockedHint = interactionHint(state);

      return `
        <section class="card">
          <div class="card-inner">
            <div class="watchlist-header">
              <div>
                <h2 class="section-title">Snack Board</h2>
                <p class="section-copy">${viewerMode && !isViewerHost() ? "Dein Profil ist schon auf deinen Namen gesetzt. Du klickst nur noch an, was du mitbringst." : !identitySelected() ? "Waehle oben zuerst deinen Namen. Danach klickst du nur noch an, was du mitbringst." : "Jeder klickt an, was er mitbringt. Mehr braucht es nicht."}</p>
              </div>
              ${viewerMode && !isViewerHost() ? `
                <div class="pills"><span class="chip live">${escapeHtml(activeParticipant.name)} ist aktiv</span></div>
              ` : !identitySelected() ? `
                <div class="pills"><span class="chip">${escapeHtml(lockedHint)}</span></div>
              ` : `
              <div class="ballot-tabs">
                ${(session.attendees || []).map((participant) => `
                  <button class="tab-btn ${participant.id === activeParticipant.id ? "active" : ""}" data-action="select-snack-participant" data-participant-id="${escapeHtml(participant.id)}" type="button">
                    ${escapeHtml(participant.name)}
                  </button>
                `).join("")}
              </div>
              `}
            </div>

            <div class="snack-grid">
              ${(session.snackCatalog || []).map((item) => {
                const owner = assignments.get(item.id);
                const participantNames = owner ? owner.participantNames || [] : [];
                const claimedByActive = owner && (owner.participantIds || []).includes(activeParticipant.id);
                return `
                  <article class="snack-card ${participantNames.length ? "claimed" : ""}">
                    <strong>${escapeHtml(`${snackIcon(item.id)} ${item.label}`)}</strong>
                    <p>${participantNames.length ? `${escapeHtml(participantNames.join(", "))} bringt es mit.` : "Noch offen."}</p>
                    <button class="btn ${claimedByActive ? "btn-ghost" : "btn-primary"}" data-action="toggle-snack" data-participant-id="${escapeHtml(activeParticipant.id)}" data-snack-id="${escapeHtml(item.id)}" type="button" ${!identitySelected() ? "disabled" : ""}>
                      ${claimedByActive ? "Doch nicht" : `${escapeHtml(activeParticipant.name)} bringt's mit`}
                    </button>
                  </article>
                `;
              }).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function tasteSectionHtml(state) {
      const participants = state.participants || [];
      const viewerMode = hasViewerLink();
      const watchlist = (state.watchlist || []).filter((film) => film.type === "movie");
      if (!participants.length) {
        return `
          <section class="card">
            <div class="card-inner">
              <h2 class="section-title">Geschmack pro Person</h2>
              <div class="empty">Sobald Teilnehmer angelegt sind, kannst du für jede Person Likes, Dislikes und Schon-gesehen auf der gemeinsamen Film-Watchlist markieren.</div>
            </div>
          </section>
        `;
      }

      if (!watchlist.length) {
        return `
          <section class="card">
            <div class="card-inner">
              <h2 class="section-title">Geschmack pro Person</h2>
              <div class="empty">Aktuell ist noch kein Titel in der Watchlist. Füge unten einfach die ersten Filme für euren gemeinsamen Pool hinzu.</div>
            </div>
          </section>
        `;
      }

      const activeParticipant = participants.find((item) => item.id === stateStore.activeParticipantId) || participants[0];
      const prefs = state.preferences || {};
      const currentPrefs = prefs[activeParticipant.id] || {};
      const disabled = !identitySelected();
      const visibleFilms = watchlist.slice(0, 8);
      const hiddenFilms = watchlist.slice(8);
      const tasteCards = (films) => films.map((film) => {
        const currentReaction = (currentPrefs[film.id] || {}).reaction || "neutral";
        return `
          <article class="watch-row">
            <div>
              <strong>${escapeHtml(film.title)}</strong>
              <p>${escapeHtml(film.serviceLabel)}${film.rt && film.rt.percent ? ` · ${escapeHtml(film.rt.percent)}% RT` : ""}</p>
            </div>
            <div class="reaction-row">
              <button class="reaction-btn ${currentReaction === "neutral" ? "active" : ""}" data-action="set-reaction" data-participant-id="${escapeHtml(activeParticipant.id)}" data-film-id="${escapeHtml(film.id)}" data-reaction="neutral" type="button" ${disabled ? "disabled" : ""}>Neutral</button>
              <button class="reaction-btn like ${currentReaction === "like" ? "active" : ""}" data-action="set-reaction" data-participant-id="${escapeHtml(activeParticipant.id)}" data-film-id="${escapeHtml(film.id)}" data-reaction="like" type="button" ${disabled ? "disabled" : ""}>Like</button>
              <button class="reaction-btn dislike ${currentReaction === "dislike" ? "active" : ""}" data-action="set-reaction" data-participant-id="${escapeHtml(activeParticipant.id)}" data-film-id="${escapeHtml(film.id)}" data-reaction="dislike" type="button" ${disabled ? "disabled" : ""}>Dislike</button>
              <button class="reaction-btn seen ${currentReaction === "seen" ? "active" : ""}" data-action="set-reaction" data-participant-id="${escapeHtml(activeParticipant.id)}" data-film-id="${escapeHtml(film.id)}" data-reaction="seen" type="button" ${disabled ? "disabled" : ""}>Schon gesehen</button>
            </div>
          </article>
        `;
      }).join("");

      return `
        <section class="card">
          <div class="card-inner">
            <div class="watchlist-header">
              <div>
                <h2 class="section-title">Geschmack pro Person</h2>
                <p class="section-copy">${viewerMode && !isViewerHost() ? "Dein Profil ist schon aktiv. Likes schieben Filme nach oben, Dislikes werfen sie für diesen Abend raus." : disabled ? "Wähle oben zuerst deinen Namen. Danach laufen Reaktionen automatisch unter deinem Profil." : "Likes schieben Filme nach oben. Dislikes werfen sie für diesen Abend raus. Schon gesehen macht sie weniger dringend."}</p>
              </div>
              ${viewerMode && !isViewerHost() ? `
                <div class="pills"><span class="chip live">${escapeHtml(activeParticipant.name)} bewertet gerade</span></div>
              ` : `
              <div class="ballot-tabs">
                ${participants.map((participant) => `
                  <button class="tab-btn ${participant.id === activeParticipant.id ? "active" : ""}" data-action="select-participant" data-participant-id="${escapeHtml(participant.id)}" type="button">
                    ${escapeHtml(participant.name)}
                  </button>
                `).join("")}
              </div>
              `}
            </div>

            <div class="watchlist-grid">
              ${tasteCards(visibleFilms)}
            </div>
            ${hiddenFilms.length ? `
              <details class="list-more">
                <summary>${hiddenFilms.length} weitere Reaktionen anzeigen</summary>
                <div class="watchlist-grid">
                  ${tasteCards(hiddenFilms)}
                </div>
              </details>
            ` : ""}
          </div>
        </section>
      `;
    }

    function commentsSectionHtml(state) {
      const participants = state.participants || [];
      const viewerMode = hasViewerLink();
      const comments = (state.comments && state.comments.length) ? state.comments : (!participants.length ? previewComments : []);
      const visibleComments = comments.slice(0, 3);
      const hiddenComments = comments.slice(3);
      const commentParticipants = participants.length ? participants : previewParticipants.map((name, index) => ({
        id: `preview-comment-${index}`,
        name,
        preview: true,
      }));

      return `
        <section class="card">
          <div class="card-inner">
            <div class="split">
              <div>
                <h2 class="section-title">Crew Feed</h2>
                <p class="section-copy">${!identitySelected() && participants.length ? "Wähle oben zuerst deinen Namen. Dann laufen Kommentare sauber unter deinem Profil." : "Kurze Kommentare, Absprachen und Running Gags für den Abend."}</p>
              </div>
              <div class="pills">
                <span class="chip">${comments.length} Einträge</span>
              </div>
            </div>

            <form class="comment-form" data-form="add-comment">
              ${viewerMode && !isViewerHost() ? `
                <div class="pills"><span class="chip live">${escapeHtml(stateStore.viewerParticipantName || "Du")} kommentiert gerade</span></div>
              ` : `
              <div class="ballot-tabs">
                ${commentParticipants.map((participant) => `
                  <button class="tab-btn ${participant.id === stateStore.activeCommentParticipantId || (!stateStore.activeCommentParticipantId && participant.preview && participant.name === "Marius") ? "active" : ""}" data-action="select-comment-participant" data-participant-id="${escapeHtml(participant.id)}" type="button" ${participant.preview ? "disabled" : ""}>
                    ${escapeHtml(participant.name)}
                  </button>
                `).join("")}
              </div>
              `}
              <input type="hidden" name="participantId" value="${escapeHtml(stateStore.activeCommentParticipantId || "")}" />
              <input class="field" type="text" name="text" maxlength="280" placeholder="z. B. Ich bringe Popcorn und heute bitte nichts mit 170 Minuten Laufzeit." required ${participants.length && identitySelected() ? "" : "disabled"} />
              <div class="toolbar">
                <button class="btn btn-primary" type="submit" ${isBusy("comment") || !participants.length || !identitySelected() ? "disabled" : ""}>
                  ${isBusy("comment") ? "Sende..." : "Kommentar posten"}
                </button>
              </div>
            </form>

            ${comments.length ? `
              <div class="comment-grid">
                ${visibleComments.map((entry) => `
                  <article class="comment-card">
                    <strong>${escapeHtml(entry.participantName || "Crew")}</strong>
                    <p>${escapeHtml(entry.text)}</p>
                    <div class="comment-meta">
                      <span>${escapeHtml(formatDate(entry.createdAt))}</span>
                      ${entry.sessionId ? `<span>zur aktiven Session</span>` : `<span>allgemeiner Crew-Eintrag</span>`}
                    </div>
                  </article>
                `).join("")}
              </div>
              ${hiddenComments.length ? `
                <details class="list-more">
                  <summary>${hiddenComments.length} weitere Kommentare anzeigen</summary>
                  <div class="comment-grid">
                    ${hiddenComments.map((entry) => `
                      <article class="comment-card">
                        <strong>${escapeHtml(entry.participantName || "Crew")}</strong>
                        <p>${escapeHtml(entry.text)}</p>
                        <div class="comment-meta">
                          <span>${escapeHtml(formatDate(entry.createdAt))}</span>
                          ${entry.sessionId ? `<span>zur aktiven Session</span>` : `<span>allgemeiner Crew-Eintrag</span>`}
                        </div>
                      </article>
                    `).join("")}
                  </div>
                </details>
              ` : ""}
            ` : `<div class="empty" style="margin-top: 18px;">Noch kein Kommentar im Feed. Genau hier dürfen die kleinen Filmabend-Kommentare wohnen.</div>`}
          </div>
        </section>
      `;
    }

    function watchlistSectionHtml(state) {
      const watchlist = state.watchlist || [];
      const movieCount = watchlist.filter((film) => film.type === "movie").length;
      const canAdd = identitySelected();
      const visibleItems = watchlist.slice(0, 6);
      const hiddenItems = watchlist.slice(6);
      const watchlistCards = (items) => items.map((film) => `
        <article class="watch-row">
          <div>
            <strong>${escapeHtml(film.title)}</strong>
            <p>${escapeHtml(film.serviceLabel)}${film.rt && film.rt.percent ? ` · ${escapeHtml(film.rt.percent)}% RT` : ""}</p>
            <details>
              <summary class="watch-detail-toggle">Trailer & Kritiken</summary>
              <div class="watch-detail-panel">
                <p>Direkt zum Trailer oder zu Rotten Tomatoes.</p>
                <div class="watch-links">
                  <a class="watch-link" href="${escapeHtml(youtubeTrailerUrl(film.title))}" target="_blank" rel="noreferrer">Trailer</a>
                  <a class="watch-link" href="${escapeHtml(rottenTomatoesUrl(film))}" target="_blank" rel="noreferrer">Rotten Tomatoes</a>
                  ${film.url ? `<a class="watch-link" href="${escapeHtml(film.url)}" target="_blank" rel="noreferrer">Streaming-Link</a>` : ""}
                </div>
              </div>
            </details>
          </div>
          <div class="reaction-row">
            ${isViewerHost() ? `<button class="reaction-btn dislike" data-action="delete-watchlist-item" data-film-id="${escapeHtml(film.id)}" type="button">Entfernen</button>` : ""}
          </div>
        </article>
      `).join("");

      return `
        <section class="card">
          <div class="card-inner">
            <div class="watchlist-header">
              <div>
                <h2 class="section-title">Gemeinsame Watchlist</h2>
                <p class="section-copy">${!canAdd && watchlist.length ? "Das ist euer offener Pool für die Movie Night. Zum Hinzufügen wählst du oben erst deinen Namen oder trittst als Gast bei." : "Das ist euer offener Pool für die Movie Night. Jeder kann Titel hinzufügen, Trailer öffnen oder Kritiken checken."}</p>
              </div>
              <div class="pills">
                <span class="chip">${watchlist.length} Titel</span>
                <span class="chip">${movieCount} bereit für heute</span>
              </div>
            </div>

            <form class="add-film-form" data-form="add-film">
              <input class="field field-inline" type="text" name="title" placeholder="Einfach Filmtitel eingeben, z. B. Interstellar" required ${canAdd ? "" : "disabled"} />
              <button class="btn btn-primary" type="submit" ${isBusy("add-film") || !canAdd ? "disabled" : ""}>
                ${isBusy("add-film") ? "Speichere..." : "Titel hinzufügen"}
              </button>
            </form>

            <div class="watchlist-grid">
              ${watchlistCards(visibleItems)}
            </div>
            ${hiddenItems.length ? `
              <details class="list-more">
                <summary>${hiddenItems.length} weitere Titel anzeigen</summary>
                <div class="watchlist-grid">
                  ${watchlistCards(hiddenItems)}
                </div>
              </details>
            ` : ""}
          </div>
        </section>
      `;
    }

    function historySectionHtml(state) {
      const participants = state.participants || [];
      const history = (state.sessionHistory && state.sessionHistory.length) ? state.sessionHistory : (!participants.length ? previewHistoryEntries : []);
      const visibleHistory = history.slice(0, 3);
      const hiddenHistory = history.slice(3);
      if (!history.length) {
        return `
          <section class="card">
            <div class="card-inner">
              <h2 class="section-title">Letzte Sneak-Nights</h2>
              <div class="empty">Sobald du die erste Session archiviert hast, tauchen hier die letzten Abende mit Teilnehmern und Gewinnerfilm auf.</div>
            </div>
          </section>
        `;
      }
      return `
          <section class="card">
            <div class="card-inner">
              <h2 class="section-title">Letzte Sneak-Nights</h2>
              <p class="section-copy">Ein kurzer Blick zurück auf die letzten Gewinner.</p>
              <div class="history-grid" style="margin-top: 16px;">
                ${visibleHistory.map((entry) => `
                  <article class="history-card">
                  <strong>${entry.winner ? escapeHtml(entry.winner.title) : "Noch ohne Sieger"}</strong>
                  <span>${escapeHtml(entry.attendees.join(", "))}</span>
                  <span>${entry.winner ? escapeHtml(entry.winner.serviceLabel) : "Archivierte Session"}</span>
                  <span>${escapeHtml(entry.scheduledFor ? formatSessionDate(entry.scheduledFor) : formatDate(entry.createdAt))}</span>
                </article>
              `).join("")}
            </div>
            ${hiddenHistory.length ? `
              <details class="list-more">
                <summary>${hiddenHistory.length} weitere Abende anzeigen</summary>
                <div class="history-grid">
                  ${hiddenHistory.map((entry) => `
                    <article class="history-card">
                      <strong>${entry.winner ? escapeHtml(entry.winner.title) : "Noch ohne Sieger"}</strong>
                      <span>${escapeHtml(entry.attendees.join(", "))}</span>
                      <span>${entry.winner ? escapeHtml(entry.winner.serviceLabel) : "Archivierte Session"}</span>
                      <span>${escapeHtml(entry.scheduledFor ? formatSessionDate(entry.scheduledFor) : formatDate(entry.createdAt))}</span>
                    </article>
                  `).join("")}
                </div>
              </details>
            ` : ""}
          </div>
        </section>
      `;
    }

    function render() {
      const state = stateStore.state;
      if (!state) {
        app.innerHTML = `
          <section class="hero">
            <div class="eyebrow">Group Film Night</div>
            <h1>Lade Daten...</h1>
            <p class="sub">Der lokale State für Watchlist, Teilnehmer und Session wird gerade geladen.</p>
            <div class="notice show" id="notice">Falls das hängen bleibt, prüfe bitte den lokalen Python-Server.</div>
          </section>
        `;
        return;
      }
      app.innerHTML = `
        ${heroHtml(state)}
        ${identityEntrySectionHtml(state)}
        ${insightStripHtml(state)}
        <div class="priority-stack">
          <div class="stack">
            ${launchGuideSectionHtml(state)}
            ${snackSectionHtml(state)}
            ${participantSectionHtml(state)}
            ${joinLinksSectionHtml(state)}
            ${sessionSectionHtml(state)}
            ${watchlistSectionHtml(state)}
            ${tasteSectionHtml(state)}
          </div>
          <div class="stack">
            ${crewSectionHtml(state)}
          </div>
        </div>
        <div class="footer-grid">
          <div class="stack">
            ${commentsSectionHtml(state)}
          </div>
          <div class="stack">
            ${historySectionHtml(state)}
          </div>
        </div>
      `;
    }

    document.addEventListener("click", async (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      try {
        if (action === "import-watchlist") {
          await postJson("/api/watchlist/import", {}, "import");
          return;
        }
        if (action === "copy-link") {
          const copyPath = target.dataset.copyPath || "/";
          const value = new URL(copyPath, window.location.origin).toString();
          await navigator.clipboard.writeText(value);
          showNotice("Persönlicher Link wurde in die Zwischenablage kopiert.");
          return;
        }
        if (action === "copy-all-links") {
          const state = stateStore.state || {};
          const links = (state.joinLinks || []).map((entry) =>
            `${entry.participantName}: ${new URL(entry.path, window.location.origin).toString()}`
          );
          if (!links.length) {
            showNotice("Aktuell sind keine persönlichen Links verfügbar.");
            return;
          }
          await navigator.clipboard.writeText(links.join("\n"));
          showNotice("Alle persönlichen Links wurden in die Zwischenablage kopiert.");
          return;
        }
        if (action === "open-profile") {
          const path = target.dataset.copyPath || "/";
          window.location.href = path;
          return;
        }
        if (action === "switch-profile") {
          window.location.href = window.location.pathname;
          return;
        }
        if (action === "seed-crew") {
          await seedStarterCrew();
          return;
        }
        if (action === "create-session") {
          await postJson("/api/session/create", {
            attendeeIds: stateStore.attendeeIds,
            scheduledFor: stateStore.sessionPlannedFor || defaultSessionDate(),
          }, "session-create");
          return;
        }
        if (action === "reveal-next") {
          await postJson("/api/session/reveal-next", {}, "reveal");
          return;
        }
        if (action === "reset-reveal") {
          await postJson("/api/session/reset-reveal", {}, "reveal-reset");
          return;
        }
        if (action === "reset-session") {
          if (!window.confirm("Aktuelle Session archivieren und eine neue Session erlauben?")) {
            return;
          }
          await postJson("/api/session/reset", {}, "reset");
          return;
        }
        if (action === "select-participant") {
          stateStore.activeParticipantId = target.dataset.participantId;
          render();
          return;
        }
        if (action === "select-snack-participant") {
          stateStore.activeSnackParticipantId = target.dataset.participantId;
          render();
          return;
        }
        if (action === "select-comment-participant") {
          stateStore.activeCommentParticipantId = target.dataset.participantId;
          render();
          return;
        }
        if (action === "set-reaction") {
          await postJson("/api/preferences", {
            participantId: target.dataset.participantId,
            filmId: target.dataset.filmId,
            reaction: target.dataset.reaction,
          }, "preference");
          return;
        }
        if (action === "toggle-snack") {
          await postJson("/api/session/snacks", {
            participantId: target.dataset.participantId,
            snackId: target.dataset.snackId,
          }, "snack");
          return;
        }
        if (action === "delete-watchlist-item") {
          if (!window.confirm("Diesen Film wirklich aus der Watchlist entfernen?")) {
            return;
          }
          await postJson("/api/watchlist/delete", {
            filmId: target.dataset.filmId,
          }, "watchlist-delete");
          return;
        }
      } catch (error) {
        showNotice(error.message || "Aktion fehlgeschlagen.");
      }
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.name === "scheduledFor") {
        stateStore.sessionPlannedFor = target.value || defaultSessionDate();
        return;
      }
      if (target.dataset.role !== "attendee-toggle") return;
      const participantId = target.dataset.participantId;
      if (!participantId) return;
      if (target.checked) {
        if (!stateStore.attendeeIds.includes(participantId)) {
          stateStore.attendeeIds.push(participantId);
        }
      } else {
        stateStore.attendeeIds = stateStore.attendeeIds.filter((id) => id !== participantId);
      }
      render();
    });

    document.addEventListener("submit", async (event) => {
      const form = event.target;
      if (!(form instanceof HTMLFormElement)) return;
      event.preventDefault();
      try {
        if (form.dataset.form === "add-participant") {
          const formData = new FormData(form);
          const name = String(formData.get("name") || "").trim();
          if (!name) throw new Error("Bitte einen Namen eingeben.");
          await postJson("/api/participants", { name }, "participant");
          form.reset();
          return;
        }
        if (form.dataset.form === "self-join") {
          const formData = new FormData(form);
          const name = String(formData.get("name") || "").trim();
          const membership = String(formData.get("membership") || "guest").trim();
          if (!name) throw new Error("Bitte einen Namen eingeben.");
          const data = await postJson("/api/participants", { name, membership, selfServe: true }, "self-join");
          if (data.joinPath) {
            window.location.href = data.joinPath;
          }
          return;
        }
        if (form.dataset.form === "create-session") {
          const formData = new FormData(form);
          const scheduledFor = String(formData.get("scheduledFor") || stateStore.sessionPlannedFor || defaultSessionDate()).trim();
          stateStore.sessionPlannedFor = scheduledFor;
          await postJson("/api/session/create", {
            attendeeIds: stateStore.attendeeIds,
            scheduledFor,
          }, "session-create");
          return;
        }
        if (form.dataset.form === "add-film") {
          const formData = new FormData(form);
          await postJson("/api/watchlist/add", {
            title: String(formData.get("title") || "").trim(),
            service: "manual",
            type: "movie",
            url: "",
          }, "add-film");
          form.reset();
          return;
        }
        if (form.dataset.form === "add-comment") {
          const formData = new FormData(form);
          await postJson("/api/comments", {
            participantId: String(formData.get("participantId") || stateStore.activeCommentParticipantId || "").trim(),
            text: String(formData.get("text") || "").trim(),
          }, "comment");
          form.reset();
          return;
        }
      } catch (error) {
        showNotice(error.message || "Aktion fehlgeschlagen.");
      }
    });

    loadState();
  </script>
</body>
</html>
