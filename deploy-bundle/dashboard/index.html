<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Group Film Night</title>
  <style>
    :root {
      --bg-0: #0d1118;
      --bg-1: #121824;
      --bg-2: #1a2231;
      --panel: rgba(16, 22, 32, 0.78);
      --panel-soft: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.10);
      --ink: #f7f7fb;
      --muted: #b8c1d1;
      --muted-soft: #8f9bb1;
      --gold: #e3ba72;
      --gold-soft: #f5d9a3;
      --red: #e05d52;
      --green: #7ed6a4;
      --blue: #8bc7ff;
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "SF Pro Display", "SF Pro Text", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(227, 186, 114, 0.14), transparent 24%),
        radial-gradient(circle at top right, rgba(143, 198, 255, 0.12), transparent 26%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 44%, var(--bg-0) 100%);
      background-attachment: fixed;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(125deg, rgba(255,255,255,0.04), transparent 20%),
        linear-gradient(315deg, rgba(255,255,255,0.03), transparent 22%);
      opacity: 0.75;
    }
    button, input, select {
      font: inherit;
    }
    .shell {
      position: relative;
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 16px 0 36px;
    }
    .hero, .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(115%);
    }
    .hero {
      padding: 26px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 18px;
      align-items: stretch;
    }
    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 680px;
    }
    .hero-preview {
      position: relative;
      min-height: 320px;
      border-radius: calc(var(--radius-xl) - 6px);
      overflow: hidden;
      border: 1px solid rgba(255, 244, 228, 0.12);
      background:
        linear-gradient(180deg, rgba(8, 6, 6, 0.12), rgba(8, 6, 6, 0.86)),
        radial-gradient(circle at top, rgba(240, 196, 125, 0.16), transparent 44%),
        rgba(255, 244, 228, 0.04);
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .hero-preview.poster-mode {
      min-height: 540px;
      align-items: stretch;
      background: #09070a;
    }
    .hero-preview::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 9, 9, 0.08), rgba(15, 9, 9, 0.92));
    }
    .hero-preview.poster-mode::before {
      background:
        linear-gradient(180deg, rgba(10, 7, 7, 0.01), rgba(10, 7, 7, 0.08) 34%, rgba(10, 7, 7, 0.24) 100%);
    }
    .hero-preview.has-art {
      background:
        linear-gradient(180deg, rgba(8, 6, 6, 0.08), rgba(8, 6, 6, 0.88)),
        radial-gradient(circle at top, rgba(240, 196, 125, 0.18), transparent 42%),
        rgba(255, 244, 228, 0.04);
    }
    .hero-poster-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 12%;
    }
    .poster-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .hero-cast {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .hero-cast::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 44%;
      background: linear-gradient(180deg, rgba(10,7,7,0), rgba(10,7,7,0.95));
    }
    .hero-portrait {
      position: absolute;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255, 244, 228, 0.18);
      background:
        radial-gradient(circle at top, rgba(139, 199, 255, 0.16), transparent 42%),
        rgba(255, 244, 228, 0.04);
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }
    .hero-portrait img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }
    .hero-portrait.main-left {
      width: 42%;
      height: 78%;
      left: 6%;
      bottom: -2%;
      z-index: 2;
    }
    .hero-portrait.main-right {
      width: 38%;
      height: 70%;
      right: 10%;
      bottom: 2%;
      z-index: 2;
    }
    .hero-portrait.support-left {
      width: 24%;
      height: 42%;
      left: -4%;
      top: 16%;
      z-index: 1;
      transform: rotate(-4deg);
    }
    .hero-portrait.support-right {
      width: 24%;
      height: 42%;
      right: -3%;
      top: 10%;
      z-index: 1;
      transform: rotate(4deg);
    }
    .hero-orbit {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 72% 26%, rgba(255, 255, 255, 0.18), transparent 12%),
        radial-gradient(circle at 74% 18%, rgba(240, 196, 125, 0.26), transparent 20%),
        radial-gradient(circle at 20% 18%, rgba(139, 199, 255, 0.18), transparent 18%);
      opacity: 0.95;
    }
    .hero-orbit::before,
    .hero-orbit::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(1px);
    }
    .hero-orbit::before {
      width: 180px;
      height: 180px;
      top: 10%;
      right: 12%;
      background: radial-gradient(circle, rgba(255,255,255,0.30), rgba(255,255,255,0.02) 62%, transparent 70%);
    }
    .hero-orbit::after {
      width: 340px;
      height: 2px;
      top: 24%;
      left: 20%;
      background: linear-gradient(90deg, rgba(139, 199, 255, 0), rgba(139, 199, 255, 0.72), rgba(139, 199, 255, 0));
      transform: rotate(-17deg);
    }
    .hero::after, .card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.05), rgba(255,255,255,0.14));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.55;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(240, 196, 125, 0.24);
      background: rgba(255, 244, 228, 0.06);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }
    h1 {
      margin: 18px 0 12px;
      max-width: 780px;
      font-size: clamp(40px, 6.8vw, 78px);
      line-height: 0.9;
      letter-spacing: -0.06em;
    }
    .sub {
      max-width: 720px;
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
    }
    .toolbar, .pills, .attendees, .reaction-row, .ballot-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .toolbar {
      margin-top: 22px;
    }
    .btn, .chip, .tab-btn, .reaction-btn, .vote-status {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 244, 228, 0.06);
      color: var(--ink);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }
    .btn, .tab-btn {
      appearance: none;
      padding: 12px 18px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .btn:hover, .tab-btn:hover, .reaction-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 244, 228, 0.26);
    }
    .btn-primary {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05)),
        linear-gradient(135deg, rgba(240,196,125,0.32), rgba(224,93,82,0.18));
      color: #fff7ef;
    }
    .btn-ghost {
      background: rgba(255, 244, 228, 0.04);
      color: var(--muted);
    }
    .btn[disabled] {
      opacity: 0.6;
      cursor: progress;
      transform: none;
    }
    .stats {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255, 244, 228, 0.05);
    }
    .stat strong {
      display: block;
      font-size: 28px;
      letter-spacing: -0.04em;
    }
    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .grid {
      display: grid;
      gap: 18px;
      margin-top: 18px;
      grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
    }
    .insight-strip {
      display: grid;
      gap: 14px;
      margin-top: 18px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .insight-card {
      padding: 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        rgba(255, 244, 228, 0.04);
      box-shadow: var(--shadow);
    }
    .insight-card .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }
    .insight-card strong {
      display: block;
      margin-top: 14px;
      font-size: 24px;
      line-height: 1.02;
      letter-spacing: -0.04em;
    }
    .insight-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .stage-rail {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 22px;
    }
    .stage-step {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 244, 228, 0.04);
    }
    .stage-step strong {
      display: block;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .stage-step span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .stage-step.active {
      border-color: rgba(240, 196, 125, 0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        rgba(240, 196, 125, 0.08);
    }
    .stack {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }
    .full-stack {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }
    .priority-stack {
      display: grid;
      gap: 18px;
      margin-top: 18px;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 0.88fr);
    }
    .card {
      border-radius: var(--radius-xl);
    }
    .card-inner {
      position: relative;
      z-index: 1;
      padding: 24px;
    }
    .section-title {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -0.04em;
    }
    .section-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 58ch;
    }
    .split {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .chip.good { color: #dff6e8; border-color: rgba(126, 214, 164, 0.28); }
    .chip.warn { color: #ffe1c7; border-color: rgba(240, 196, 125, 0.30); }
    .chip.live { color: #ffd6d3; border-color: rgba(224, 93, 82, 0.28); }
    .notice {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(224, 93, 82, 0.36);
      background: rgba(224, 93, 82, 0.12);
      color: #ffe4e1;
      line-height: 1.45;
    }
    .notice.show { display: block; }
    .participant-grid, .candidate-grid, .watchlist-grid, .history-grid {
      display: grid;
      gap: 12px;
    }
    .legend-grid, .member-grid, .host-grid {
      display: grid;
      gap: 12px;
    }
    .participant-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .candidate-grid {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }
    .history-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .legend-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 18px;
    }
    .host-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }
    .member-grid {
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      margin-top: 18px;
    }
    .participant-card, .candidate-card, .history-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255, 244, 228, 0.05);
      padding: 16px;
    }
    .participant-card.active {
      border-color: rgba(126, 214, 164, 0.26);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        rgba(126, 214, 164, 0.08);
    }
    .legend-card, .member-card, .host-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        rgba(255, 244, 228, 0.05);
      overflow: hidden;
    }
    .legend-card {
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .legend-card strong {
      display: block;
      font-size: 24px;
      letter-spacing: -0.04em;
    }
    .legend-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .participant-card label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .participant-card strong, .candidate-card strong, .history-card strong {
      display: block;
      font-size: 18px;
      letter-spacing: -0.03em;
    }
    .participant-card span, .candidate-card span, .history-card span, .candidate-card p {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      margin-top: 6px;
    }
    .history-card {
      position: relative;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        rgba(255, 244, 228, 0.05);
    }
    .history-card::before {
      content: "";
      position: absolute;
      inset: auto -30px -40px auto;
      width: 160px;
      height: 160px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(240, 196, 125, 0.18), transparent 62%);
      pointer-events: none;
    }
    .history-card > * {
      position: relative;
      z-index: 1;
    }
    .host-card,
    .member-card {
      display: grid;
      min-height: 100%;
      box-shadow: var(--shadow);
    }
    .host-card,
    .member-card {
      grid-template-rows: auto 1fr;
      align-content: start;
    }
    .portrait-frame {
      position: relative;
      overflow: hidden;
      width: min(100%, 320px);
      aspect-ratio: 4 / 5;
      margin: 16px auto 0;
      display: block;
      padding: 0;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top, rgba(139, 199, 255, 0.12), transparent 34%),
        radial-gradient(circle at bottom, rgba(240, 196, 125, 0.12), transparent 30%),
        linear-gradient(180deg, rgba(8, 12, 22, 0.22), rgba(8, 12, 22, 0.96));
    }
    .portrait-frame.contained {
      padding: 0;
    }
    .portrait-frame::before {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 42%;
      background: linear-gradient(180deg, rgba(10, 7, 10, 0), rgba(10, 7, 10, 0.7));
      z-index: 1;
      pointer-events: none;
    }
    .portrait-frame::after {
      content: "";
      position: absolute;
      inset: auto -36px -50px auto;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.16), transparent 65%);
      pointer-events: none;
    }
    .portrait-fix {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }
    .portrait-fix.top-right-soft {
      top: 0;
      right: 0;
      width: 84px;
      height: 84px;
      background:
        radial-gradient(circle at top right, rgba(8, 12, 20, 0.98) 0 24px, rgba(8, 12, 20, 0.88) 25px, transparent 58px);
    }
    .portrait-frame img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      transform: none;
      transform-origin: center center;
      filter: saturate(1.02) contrast(1.03);
    }
    .portrait-frame.contained img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform-origin: center center;
      filter: saturate(1.02) contrast(1.03);
    }
    .host-card .portrait-frame.contained {
      padding: 0;
    }
    .host-card .portrait-frame.contained img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform-origin: center center;
      filter: saturate(1.02) contrast(1.03);
    }
    .host-card .portrait-frame img,
    .member-card .portrait-frame img {
      border-radius: 0;
    }
    .member-body, .host-body {
      position: relative;
      padding: 16px 18px 18px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .host-body {
      justify-content: flex-start;
    }
    .member-body strong,
    .host-body strong {
      display: block;
      font-size: 24px;
      letter-spacing: -0.04em;
    }
    .host-body strong {
      font-size: 26px;
    }
    .member-body p,
    .host-body p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }
    .member-subline,
    .host-subline {
      color: var(--gold-soft);
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: -0.01em;
    }
    .member-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      align-items: flex-start;
    }
    .member-head > div {
      min-width: 0;
    }
    .member-head .status-tag {
      justify-self: flex-start;
    }
    .role-tag, .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .role-tag {
      color: var(--gold-soft);
      background: rgba(240, 196, 125, 0.12);
    }
    .status-tag {
      color: var(--blue);
      background: rgba(139, 199, 255, 0.11);
    }
    .status-tag.host {
      color: #fff4db;
      background: rgba(240, 196, 125, 0.16);
    }
    .status-tag.warn {
      color: #ffe1de;
      background: rgba(224, 93, 82, 0.13);
    }
    .member-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .metric-box {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 244, 228, 0.08);
      background: rgba(255, 244, 228, 0.04);
    }
    .metric-box strong {
      font-size: 22px;
      line-height: 1;
    }
    .metric-box span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .member-facts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .fact-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      if (!value) {
        return "Noch nie";
      }
      try {
        return new Date(value).toLocaleString("de-DE", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      } catch {
        return value;
      }
    }

    function defaultSessionDate() {
      const today = new Date();
      const local = new Date(today.getTime() - today.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function formatSessionDate(value) {
      if (!value) {
        return "Heute Abend";
      }
      try {
        return new Date(`${value}T12:00:00`).toLocaleDateString("de-DE", {
          weekday: "long",
          day: "2-digit",
          month: "2-digit",
        });
      } catch {
        return value;
      }
    }

    function youtubeTrailerUrl(title) {
      const query = encodeURIComponent(`${title || ""} trailer`);
      return `https://www.youtube.com/results?search_query=${query}`;
    }

    function snackIcon(snackId) {
      return {
        nachos: "🧀",
        chips: "🥔",
        schokolade: "🍫",
        eis: "🍦",
        bier: "🍺",
        sonstiges: "🎒",
      }[String(snackId || "").toLowerCase()] || "🍿";
    }

    function rottenTomatoesUrl(film) {
      const direct = film && film.rt && film.rt.url;
      if (direct) {
        return direct;
      }
      const query = encodeURIComponent(film && film.title ? film.title : "");
      return `https://www.rottentomatoes.com/search?search=${query}`;
    }

    function currentViewerToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("viewer") || "";
    }

    function apiUrl(path) {
      const token = currentViewerToken();
      if (!token) {
        return path;
      }
      const separator = path.includes("?") ? "&" : "?";
      return `${path}${separator}viewer=${encodeURIComponent(token)}`;
    }

    function hasViewerLink() {
      return !!stateStore.viewerParticipantId;
    }

    function isViewerHost() {
      return !!stateStore.viewerIsHost;
    }

    function identitySelected() {
      return hasViewerLink();
    }

    function requiresIdentity(state) {
      return !!(((state && state.participants) || []).length);
    }

    function interactionHint(state, hostOnly = false) {
      if (!requiresIdentity(state)) {
        return "Lege zuerst die Crew an.";
      }
      if (!identitySelected()) {
        return "Waehle oben zuerst deinen Namen oder tritt als Gast bei.";
      }
      if (hostOnly && !isViewerHost()) {
        return "Das duerfen nur Hosts.";
      }
      return "";
    }

    function joinPathForParticipant(state, participantId) {
      const links = state && state.joinLinks ? state.joinLinks : [];
      const match = links.find((entry) => entry.participantId === participantId);
      return match ? match.path : "";
    }

    function normalizePersonKey(value) {
      return String(value || "")
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "");
    }

    function crewMemberForName(name) {
      const normalized = normalizePersonKey(name);
      return crewMembers.find((member) =>
        [member.key, member.name, ...(member.aliases || [])]
          .map(normalizePersonKey)
          .includes(normalized)
      ) || null;
    }

    function crewMetrics(state) {
      const participants = state.participants || [];
      const preferences = state.preferences || {};
      const history = state.sessionHistory || [];
      const session = state.currentSession;
      const participantByCrewKey = new Map();

      participants.forEach((participant) => {
        const member = crewMemberForName(participant.name);
        if (member && !participantByCrewKey.has(member.key)) {
          participantByCrewKey.set(member.key, participant);
        }
      });

      return crewMembers.map((member) => {
        const participant = participantByCrewKey.get(member.key);
        const prefEntries = participant ? Object.values(preferences[participant.id] || {}) : [];
        const likes = prefEntries.filter((entry) => entry && entry.reaction === "like").length;
        const seen = prefEntries.filter((entry) => entry && entry.reaction === "seen").length;
        const dislikes = prefEntries.filter((entry) => entry && entry.reaction === "dislike").length;
        const nights = history.filter((entry) =>
          (entry.attendees || []).some((attendee) => normalizePersonKey(attendee) === member.key)
        ).length;
        const totalNights = history.length;
        const preview = (!totalNights && !participants.length) ? previewCrewStats[member.key] || null : null;
        const attendancePercent = member.host
          ? 100
          : totalNights
            ? Math.round((nights / totalNights) * 100)
            : (preview ? preview.attendancePercent : 0);
        const activeTonight = !!(session && (session.attendees || []).some((attendee) =>
          normalizePersonKey(attendee.name) === member.key
        ));
        return {
          ...member,
          participant,
          likes: preview ? preview.likes : likes,
          seen: preview ? preview.seen : seen,
          dislikes: preview ? preview.dislikes : dislikes,
          nights: preview ? preview.nights : nights,
          attendancePercent,
          activeTonight: preview ? preview.activeTonight : activeTonight,
        };
      });
    }

    function crewStatusLabel(member, totalArchivedNights) {
      if (member.host) {
        return { label: "Host", tone: "host" };
      }
      if (member.attendancePercent >= 80) {
        return { label: "Familienmitglied", tone: "host" };
      }
      if (member.attendancePercent >= 60) {
        return { label: "Brücken-Crew", tone: "" };
      }
      if (member.attendancePercent >= 50) {
        return { label: "Stammgast", tone: "" };
      }
      if (member.attendancePercent >= 30) {
        return { label: "Söldner", tone: "" };
      }
      if (member.attendancePercent > 0) {
        return { label: "Verschollen am Rand der Galaxie", tone: "warn" };
      }
      return { label: "Noch im Hyperraum", tone: "" };
    }

    function heroCastHtml() {
      const byKey = new Map(crewMembers.map((member) => [member.key, member]));
      const slots = [
        { key: "marius", cls: "main-left" },
        { key: "kathi", cls: "main-right" },
        { key: "mirko", cls: "support-left" },
        { key: "flo", cls: "support-right" },
      ];
      return `
        <div class="hero-cast">
          <div class="hero-orbit"></div>
          ${slots.map((slot) => {
            const member = byKey.get(slot.key);
            if (!member) {
              return "";
            }
            return `
              <figure class="hero-portrait ${slot.cls}">
                <img src="${escapeHtml(member.image)}" alt="${escapeHtml(member.name)}" />
              </figure>
            `;
          }).join("")}
        </div>
      `;
    }

    function isBusy(key) {
      return stateStore.busy.has(key);
    }

    function setBusy(key, value) {
      if (value) {
        stateStore.busy.add(key);
      } else {
        stateStore.busy.delete(key);
      }
      render();
    }

    function showNotice(message) {
      const notice = document.getElementById("notice");
      if (!notice) return;
      notice.textContent = message;
      notice.classList.add("show");
    }

    function clearNotice() {
      const notice = document.getElementById("notice");
      if (!notice) return;
      notice.textContent = "";
      notice.classList.remove("show");
    }

    async function postJson(url, payload, busyKey) {
      clearNotice();
      if (busyKey) {
        setBusy(busyKey, true);
      }
      try {
        const response = await fetch(apiUrl(url), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {}),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Aktion fehlgeschlagen.");
        }
        stateStore.state = data.state;
        syncUiState();
        render();
        return data;
      } finally {
        if (busyKey) {
          setBusy(busyKey, false);
        }
      }
    }

    async function seedStarterCrew() {
      const state = stateStore.state || {};
      const existing = new Set((state.participants || []).map((participant) => participant.name.toLowerCase()));
      const missingNames = starterCrewNames.filter((name) => !existing.has(name.toLowerCase()));
      if (!missingNames.length) {
        showNotice("Die Starter-Crew ist bereits angelegt.");
        return;
      }
      clearNotice();
      setBusy("seed-crew", true);
      try {
        for (const name of missingNames) {
          const response = await fetch(apiUrl("/api/participants"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "Starter-Crew konnte nicht angelegt werden.");
          }
          stateStore.state = data.state;
        }
        syncUiState();
        stateStore.attendeeIds = (stateStore.state.participants || []).map((participant) => participant.id);
        render();
        showNotice("Starter-Crew ist angelegt. Jetzt kannst du direkt Teilnehmer wählen und den ersten Filmabend planen.");
      } finally {
        setBusy("seed-crew", false);
      }
    }

    async function loadState() {
      clearNotice();
      try {
        const response = await fetch(apiUrl("/api/state"));
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "State konnte nicht geladen werden.");
        }
        stateStore.state = data.state;
        syncUiState();
        render();
      } catch (error) {
        showNotice(error.message || "State konnte nicht geladen werden.");
      }
    }

    function syncUiState() {
      const state = stateStore.state;
      if (!state) return;
      const viewer = state.viewer || {};
      stateStore.viewerParticipantId = viewer.participantId || null;
      stateStore.viewerParticipantName = viewer.participantName || "";
      stateStore.viewerIsHost = !!viewer.isHost;
      const participants = state.participants || [];
      const participantIds = participants.map((item) => item.id);
      const session = state.currentSession;

      if (session && session.scheduledFor) {
        stateStore.sessionPlannedFor = session.scheduledFor;
      } else if (!stateStore.sessionPlannedFor) {
        stateStore.sessionPlannedFor = defaultSessionDate();
      }

      if (session) {
        stateStore.attendeeIds = [...session.attendeeIds];
      } else if (!stateStore.attendeeIds.length) {
        stateStore.attendeeIds = [...participantIds];
      } else {
        stateStore.attendeeIds = stateStore.attendeeIds.filter((id) => participantIds.includes(id));
      }

      if (stateStore.viewerParticipantId && participantIds.includes(stateStore.viewerParticipantId)) {
        stateStore.activeParticipantId = stateStore.viewerParticipantId;
      } else if (!stateStore.activeParticipantId || !participantIds.includes(stateStore.activeParticipantId)) {
        stateStore.activeParticipantId = participantIds[0] || null;
      }

      const snackCandidates = session ? session.attendeeIds : stateStore.attendeeIds;

      if (stateStore.viewerParticipantId && snackCandidates.includes(stateStore.viewerParticipantId)) {
        stateStore.activeSnackParticipantId = stateStore.viewerParticipantId;
      } else if (!stateStore.activeSnackParticipantId || !snackCandidates.includes(stateStore.activeSnackParticipantId)) {
        stateStore.activeSnackParticipantId = snackCandidates[0] || null;
      }

      if (stateStore.viewerParticipantId && participantIds.includes(stateStore.viewerParticipantId)) {
        stateStore.activeCommentParticipantId = stateStore.viewerParticipantId;
      } else if (!stateStore.activeCommentParticipantId || !participantIds.includes(stateStore.activeCommentParticipantId)) {
        stateStore.activeCommentParticipantId = participantIds[0] || null;
      }
    }

    function findFeaturedFilm(state) {
      const session = state.currentSession;
      if (session && session.revealed && session.revealed.length) {
        return session.revealed[0].film;

      if (session && session.candidates && session.candidates.length) {
        return session.candidates[0];
      }
      const movieWithImage = (state.watchlist || []).find((item) => item.type === "movie" && item.image);
      return movieWithImage || (state.watchlist || []).find((item) => item.type === "movie") || null;

        return "";
      }
      return `

          <div class="card-inner">
            <div class="split">
              <div>
                <h2 class="section-title">So geht der Abend live</h2>
                <p class="section-copy">1. Pool füllen. 2. Reaktionen setzen. 3. Hosts legen die Runde für heute fest. 4. Das System wählt automatisch den besten Film. 5. Erst vor Ort kommt der Reveal.</p>
              </div>
              <div class="pills">
                <span class="chip good">Kein Login nötig</span>
                <span class="chip">${isViewerHost() ? "Host-Profil aktiv" : "Profil aktiv"}</span>
              </div>
            </div>
            <div class="launch-guide">
              <article class="launch-step">
                <div class="label">Schritt 1</div>

              </article>
              <article class="launch-step">
                <div class="label">Schritt 2</div>
                <strong>Hosts setzen die Runde</strong>
                <p>Datum und heutige Teilnehmer festlegen. Mehr braucht es vor dem Abend nicht.</p>
              </article>
              <article class="launch-step">
                <div class="label">Schritt 3</div>
                <strong>Automatischer Pick, dann großer Reveal</strong>

            </div>
            <div class="launch-helper">
              <strong>Host-Rechte:</strong> Nur Hosts dürfen Teilnehmer festlegen, die Session starten und den Reveal auslösen. Alle anderen Aktionen laufen unter dem jeweils gewählten Profil.
            </div>
          </div>
        </section>
      `;
    }

    function joinLinksSectionHtml(state) {
      const links = state.joinLinks || [];
      if (!links.length || !isViewerHost()) {
        return "";
      }
      return `
        <section class="card">
          <div class="card-inner">
            <div class="split">
              <div>
                <h2 class="section-title">Direktlinks der Stammcrew</h2>
                <p class="section-copy">Optional für Hosts oder Stammgäste. Im Alltag reicht oben einfach die Namenswahl, aber hier kannst du die individuellen Direktlinks weitergeben oder sichern.</p>

              <div class="pills">
                <span class="chip good">${links.length} Direktlinks bereit</span>

              </div>
            </div>
            <div class="watchlist-grid">
              ${links.map((entry) => `
                <article class="watch-row">
                  <div>
                    <strong>${escapeHtml(entry.participantName)}</strong>
                    <p>Direkter Link für die persönliche Ansicht ohne Registrierung.</p>
                  </div>
                  <div class="reaction-row">
                    <button class="btn btn-primary" data-action="copy-link" data-copy-path="${escapeHtml(entry.path)}" type="button">Link kopieren</button>

            </div>
          </div>
        </section>
